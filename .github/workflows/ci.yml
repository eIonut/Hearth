name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installs root deps and, via the postinstall hook, the client deps.
      - run: npm ci

      - run: npm run lint

      - run: npm --prefix client run build
